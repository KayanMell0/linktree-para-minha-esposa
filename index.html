<!doctype html>
<html lang="pt-br" class="">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto</title>
    <link rel="stylesheet" href="style.css" />

  <body>
    <div id="container">
      <div id="profile">
        <img
          src="./assets/avatar.png"
          alt="Avatar da Shay com olhos abertos e boca aberta (sorrindo)"
        />
        <p>@shayziiinhaa</p>
      </div>

      <div id="switch" onclick="toggleMode()">
        <button></button>
        <span></span>
      </div>

      <ul>
        <!-- (Unsorted List) Tag de Lista desordenada(nao é ordenada por numero, diferente da <ol>) -->
        <li>
          <!-- Tag do item da lista -->
          <a href="https://www.twitch.tv/shayziinha" target="_blank"
            >LIVES NA ROXINHA &nbsp;
            <ion-icon name="logo-twitch"></ion-icon>
          </a>
          <!-- Tag de Link, lembrando que atributo href="" seria o caminho do link, se tiver "#" o caminho é vazio (não abre nada) -->
        </li>

        <li>
          <a href="https://www.tiktok.com/@shayziiinhaa/" target="_blank"
            >LIVES NO TIKO E TEKO &nbsp;
            <ion-icon name="logo-tiktok"></ion-icon>
          </a>
        </li>

        <li>
          <a href="https://www.instagram.com/shaayziinha" target="_blank"
            >INSTAGRAM &nbsp; <ion-icon name="logo-instagram"></ion-icon
          ></a>
          <!-- O "target="_blank" faz com que o link abra em uma nova guia do navegador ao inves de substituir a guia da pagina -->
        </li>

        <li>
          <a href="https://www.threads.com/@shaayziinha" target="_blank"
            >THREADS</a
          >
        </li>
      </ul>
